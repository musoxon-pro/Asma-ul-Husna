    const namesContainer = document.getElementById('namesList');
    const modal = document.getElementById('modal');
    const modalArabic = document.getElementById('modalArabic');
    const modalLatin = document.getElementById('modalLatin');
    const modalNumber = document.getElementById('modalNumber');
    const modalMeaning = document.getElementById('modalMeaning');
    const closeBtn = document.getElementById('closeModalBtn');

    function renderButtons() {
        namesContainer.innerHTML = '';
        asmaData.forEach(item => {
            const button = document.createElement('button');
            button.className = 'name-btn';
            button.innerHTML = `
                <div class="btn-left">
                    <span class="btn-number">${item.number}</span>
                    <span class="btn-latin">${item.latin}</span>
                </div>
                <div class="btn-arabic">${item.arabic}</div>
            `;
            button.addEventListener('click', () => openModal(item));
            namesContainer.appendChild(button);
        });
    }

    function openModal(item) {
        modalArabic.textContent = item.arabic;
        modalLatin.textContent = item.latin;
        modalNumber.textContent = `#${item.number}`;
        modalMeaning.innerHTML = `<span style="font-weight:bold; display:block; margin-bottom:8px;">✨ Ma'no va mazmuni:</span> ${item.meaning}`;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModalFunc() {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    closeBtn.addEventListener('click', closeModalFunc);
    window.addEventListener('click', (e) => {
        if (e.target === modal) closeModalFunc();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display === 'flex') closeModalFunc();
    });

    // PWA o'rnatish
    let deferredPrompt;
    const installBanner = document.getElementById('installBanner');
    
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBanner.style.display = 'flex';
    });
    
    installBanner.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBanner.style.display = 'none';
            }
            deferredPrompt = null;
        }
    });

    renderButtons();
</script>
</body>
